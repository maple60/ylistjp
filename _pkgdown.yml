url: https://maple60.github.io/ylistjp/

template:
  bootstrap: 5

home:
  title: ylistjp
  description: >
    Unofficial R helpers for looking up scientific plant names from Japanese
    names using the Vascular Plant Japanese Name Checklist ver. 1.10.

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github]
  components:
    intro:
      text: Get Started
      href: articles/get-started.html
    articles:
      text: Guides
      menu:
      - text: "English: Usage Guide"
        href: articles/get-started.html
      - text: "日本語: 使い方ガイド"
        href: articles/ja-get-started.html
      - text: "English: Maintenance Guide"
        href: articles/maintenance.html
      - text: "日本語: メンテナンスガイド"
        href: articles/ja-maintenance.html
      - text: "English: Package Development Tutorial"
        href: articles/package-development.html
      - text: "日本語: パッケージ開発チュートリアル"
        href: articles/ja-package-development.html

articles:
- title: User guides
  navbar: Guides
  contents:
  - get-started
  - ja-get-started
- title: Developer guides
  navbar: Developer guides
  contents:
  - maintenance
  - ja-maintenance
- title: Learning guides
  navbar: Learning guides
  contents:
  - package-development
  - ja-package-development

reference:
- title: Overview
  contents:
  - ylistjp-package
- title: Data access
  desc: Download and load the checklist Excel file.
  contents:
  - japanese_name_download
  - japanese_name_load
- title: Name lookup
  desc: Search cached checklist rows and retrieve scientific names.
  contents:
  - scientific_name
  - japanese_name_search
  - japanese_name_suggest
  - japanese_name_info
- title: International checks
  desc: Optional helper for checking scientific names against GBIF.
  contents:
  - gbif_match
